name: Sequential Jobs Test

on:
  workflow_dispatch:  
    
    

jobs:
  # Job 1: This runs first
  compile-code:
    runs-on: ubuntu-latest
    steps:
      - name: Build step
        run: |
          echo "Compiling the application..."
          echo "Build successful!"

  # Job 2: This WAITS for compile-code to finish
  deploy-app:
    runs-on: ubuntu-latest
    needs: compile-code # 👈 This keyword links the jobs together
    steps:
      - name: Deploy step
        run: |
          echo "Deploying the built application now..."
          echo "Deployment complete."
