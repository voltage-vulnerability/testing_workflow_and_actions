name: Build and Scan Multistage

on: 
  workflow_dispatch

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -f Dockerfile.dev -t my-image:v2 .

      - name: Archive docker image to file
        run: docker save -o my-image-v2.tar my-image:v2

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-artifact
          path: my-image-v2.tar
          retention-days: 1

  scan-image:
    runs-on: ubuntu-latest
    needs: build-docker-image
    steps:
      - name: Download Image Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-image-artifact

      - name: Load docker image
        run: docker load -i my-image-v2.tar

      - name: Run trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: "my-image:v2"
          scan-type: "image"
          format: "table"
