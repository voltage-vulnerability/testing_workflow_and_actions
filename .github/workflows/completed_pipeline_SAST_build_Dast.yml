name: Two Secure DevSecOps Build and Scan Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write           # 🟢 FIX: Allows the ZAP DAST scan job to open issue tickets
  security-events: write  # Required by CodeQL to post to the Security tab
  actions: read

jobs:
  # ⛓️ JOB 1: Semgrep Code Scanner (Runs in Semgrep Container)
  semgrep-analysis:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run semgrep code scan
        run: |
          semgrep scan --config=p/security-audit --config=p/python --config=p/owasp-top-ten --include="app.py" || true

  # ⛓️ JOB 2: GitHub CodeQL Scanner (Runs on Base Host Ubuntu Machine)
  codeql-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Initializes the CodeQL tools and creates a blank tracking database
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'python' # Explicitly tells CodeQL to track Python text patterns

      # Performs the structural analysis scan over your repository files
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # 🐳 JOB 3: This waits for BOTH security scanners to finish successfully
  container-security-analysis:
    runs-on: ubuntu-latest
    # 👈 This bracket makes the job wait for BOTH code scanning blocks to pass
    needs: [semgrep-analysis, codeql-analysis] 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Building docker Image
        run: |
          docker build -t app-image:v1 .

      - name: Run trivy scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'app-image:v1'
          scan-type: 'image'
          format: 'table'
          exit-code: '0'

  # 🌐 JOB 4: DAST Scan (Runs after the container image is verified)
  dast-analysis:
    runs-on: ubuntu-latest
    needs: [container-security-analysis] # Wait until the container builds and scans cleanly
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # To run DAST, your application must be running. We spin up your container image here.
      - name: Start Application Container
        run: |
          docker build -t app-image:v1 .
          docker run -d -p 5000:5000 --name running-app app-image:v1
          sleep 5 # Give the app a few seconds to boot up safely

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:5000' # Scans the container running inside the runner
          create_issue: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
