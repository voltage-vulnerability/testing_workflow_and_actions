name: Secure DevSecOps Build and Scan Pipeline

on:
  workflow_dispatch:

jobs:
  static-code-analysis:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep  # 👈 Fixed spelling from smegrep to semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run semgrep code scan
        run: |
          semgrep scan --config=p/security-audit --config=p/python --config=p/owasp-top-ten --include="app.py" || true
  
  container-security-analysis:  # 👈 Added the missing unique Job ID name
    runs-on: ubuntu-latest
    needs: static-code-analysis
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Building docker Image
        run: |
          docker build -t app-image:v1 .  # 👈 Added the missing trailing context dot

      - name: Run trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 👈 Fixed step indentation alignment
        with:
          image-ref: 'app-image:v1'
          scan-type: 'image'
          format: 'table'
          exit-code: '0'
