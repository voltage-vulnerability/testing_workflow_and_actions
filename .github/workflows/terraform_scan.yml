name: Terraform Security Scan

on:
 workflow_dispatch:

jobs:
  terraform-scan-using-checkov:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     - uses: bridgecrewio/checkov-action@master
       with:
         quiet: true
  
  terraform-scan-using-trivy:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     - uses: aquasecurity/tfsec-action@v1.0.0
       with:
         scan-type: "config"
         hide-progress: true
         exit-code: '1'
         
  terrafom-scn-using-nessus-tfscan:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     - uses: tenable/terrascan-action@v1.4.1
       with:
         iac_type: 'terraform'
         policy_type: 'terraform'
         verbose: true
